            </span>
        </h1>

        <!-- Subtítulo y Separador -->
        <div class="flex flex-col items-center max-w-3xl">
            <div class="w-12 h-[2px] bg-[#ffd700] mb-8"></div>
            <p id="hero-sub"
                class="text-white text-xs md:text-base font-medium uppercase tracking-[0.5em] leading-relaxed opacity-90">
                Resiliencia Energética y Control Predictivo en AC/DC
            </p>

        </div>
    </header>


    <main id="main-content" class="space-y-16"></main>

    <div id="vatiaco-contact-root"></div>

    <div class="ticker-wrap" id="news-ticker">
        <div class="ticker-move" id="ticker-content"></div>
    </div>

    <footer class="bg-black/90 border-t border-white/5 pt-20 pb-10">
        <div class="max-w-7xl mx-auto px-10 grid md:grid-cols-4 gap-12">
            <div>
                <span class="text-xl font-black italic tracking-tighter text-white">VATIACO</span>
                <p id="footer-desc"
                    class="text-white/20 text-[9px] uppercase font-bold mt-4 tracking-widest leading-relaxed">Control
                    avanzado de microredes y activos energéticos.</p>
            </div>
            <div id="footer-links-dynamic" class="md:col-span-2 grid grid-cols-2 gap-8"></div>
            <div>
                <h4 class="text-[10px] font-black uppercase text-[#003399] mb-6 tracking-widest">Support</h4>
                <a href="mailto:info@vatiaco.com" class="footer-link">info@vatiaco.com</a>
            </div>
        </div>
    </footer>

    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';

        // Lógica de Renderizado Dinámico
        const renderApp = () => {
            const t = translations[currentLang];

            // 1. ACTUALIZACIÓN DEL SELECTOR DE IDIOMA (DROPDOWN)
            const langMeta = {
                en: { flag: '🇬🇧', label: 'ENG' },
                es: { flag: '🇪🇸', label: 'ESP' },
                it: { flag: '🇮🇹', label: 'ITA' }
            };

            const langDisplay = document.getElementById('current-lang-display');
            if (langDisplay) {
                langDisplay.innerHTML = `
                    <span class="text-lg leading-none">${langMeta[currentLang].flag}</span>
                    <span class="text-[10px] font-black text-slate-600">${langMeta[currentLang].label}</span>
                    <i class="material-icons text-[14px] text-slate-400">expand_more</i>
                `;
            }

            // 2. ACTUALIZACIÓN DE TEXTOS ESTÁTICOS
            document.getElementById('hero-tag').innerText = t.heroTag;
            document.getElementById('hero-sub').innerText = t.heroSub;
            document.getElementById('footer-desc').innerText = t.heroSub;
            document.getElementById('auth-title-text').innerText = t.authTitle;
            document.getElementById('auth-btn').innerText = t.authBtn;

            // 3. REFERENCIAS A CONTENEDORES DINÁMICOS
            const nav = document.getElementById('nav-content');
            const mobileNav = document.getElementById('mobile-nav-content');
            const footer = document.getElementById('footer-links-dynamic');
            const main = document.getElementById('main-content');

            if (nav) nav.innerHTML = '';
            if (mobileNav) mobileNav.innerHTML = '';
            if (footer) footer.innerHTML = '';
            if (main) main.innerHTML = '';

            // 4. GENERACIÓN DINÁMICA DESDE APPDATA
            appData.forEach(cat => {
                const catName = cat.category[currentLang];

                // --- Desktop Nav ---
                if (nav) {
                    const navGroup = document.createElement('div');
                    navGroup.className = 'nav-item-group';
                    navGroup.innerHTML = `
                        <span class="nav-link-text !text-[#000000]">${catName}</span>
                        <div class="dropdown-menu">
                            ${cat.items.map(item => `
                                <a href="#${item.id}" class="dropdown-item" onclick="closeIframe()"> 
                                    <b>${item.title[currentLang]}</b>
                                    <span>${item.subtitle[currentLang]}</span>
                                </a>
                            `).join('')}
                        </div>
                    `;
                    nav.appendChild(navGroup);
                }

                // --- Mobile Nav ---
                // --- Mobile Nav ---
                // --- Mobile Nav ---
                if (mobileNav) {
                    const mCat = document.createElement('div');
                    mCat.className = "mb-6"; // Espacio entre categorías

                    // Título de categoría: Naranja, alineado a la izquierda
                    mCat.innerHTML = `
        <div class="text-[#000000] font-black uppercase text-[10px] tracking-[0.2em] mb-4 border-b border-slate-100 pb-2">
            ${catName}
        </div>`;

                    const mList = document.createElement('div');
                    // Indentación tipo árbol: borde izquierdo gris y padding
                    mList.className = "flex flex-col gap-5 ml-2 pl-4 border-l-2 border-slate-100";

                    cat.items.forEach(item => {
                        const a = document.createElement('a');
                        a.href = `#${item.id}`;
                        // Alineación a la izquierda y texto negro
                        a.className = "flex flex-col items-start group no-underline";

                        a.innerHTML = `
            <div class="flex items-center gap-2">
                <!-- Pequeño indicador visual de rama -->
                <div class="w-2 h-[1px] bg-slate-300"></div>
                <span class="text-black font-black uppercase text-[12px] leading-tight group-hover:text-[#000000] transition-colors">
                    ${item.title[currentLang]}
                </span>
            </div>
            <span class="text-slate-500 font-medium uppercase text-[9px] tracking-wider mt-1 ml-4 opacity-70">
                ${item.subtitle[currentLang]}
            </span>
        `;

                        a.onclick = () => {
                            closeIframe();
                            document.getElementById('mobile-menu').classList.remove('active');
                        };
                        mList.appendChild(a);
                    });
                    mCat.appendChild(mList);
                    mobileNav.appendChild(mCat);
                }

                // --- Main Content ---
                if (main) {
                    const sectionGroup = document.createElement('div');
                    sectionGroup.className = "pt-24 pb-10";
                    sectionGroup.innerHTML = `
                        <div class="max-w-7xl mx-auto px-6 mb-10 text-center">
                            <h3 class="text-3xl font-black uppercase italic text-[#ffffff] opacity-80 tracking-tighter">
                                ${catName}
                            </h3>
                            <div class="w-12 h-[2px] bg-[#ffffff] mx-auto mt-2 opacity-50"></div>
                        </div>`;

                    cat.items.forEach((sec, idx) => {
                        const layout = idx % 2 === 0 ? 'md:flex-row' : 'md:flex-row-reverse';
                        const section = document.createElement('section');
                        section.id = sec.id;
                        section.className = 'py-16 scroll-mt-24';
                        section.innerHTML = `
                            <div class="max-w-7xl mx-auto px-6">
                                <div class="flex flex-col-reverse ${layout} items-center gap-12">
                                    
                                    <div class="w-full md:w-1/2 img-container-mobile group">
                                        ${sec.isNew ? '<div class="absolute -top-3 -left-3 z-10 bg-[#e74c3c] text-white px-3 py-1 font-black italic text-xs shadow-2xl rotate-[-5deg]">NEW</div>' : ''}
<video 
    class="mobile-frame video-strict-loop" 
    autoplay 
    muted 
    playsinline 
    preload="auto" 
    onloadeddata="this.playbackRate = 6.0; this.play();" 
    onended="this.currentTime = 0; this.play();"
    onclick="openIframe('${sec.btnLink}')">
    <source src="${sec.image}" type="video/mp4">
</video>


                                        
                                    </div>

                                    <div class="w-full md:w-1/2">
                                        <h2 class="text-4xl md:text-5xl font-black mb-4 italic uppercase text-white">${sec.title[currentLang]}</h2>
                                        <div class="text-[#ffd700] font-black uppercase text-sm tracking-[0.2em] mb-6 border-b-2 border-[#ffd700] inline-block pb-1">${sec.subtitle[currentLang]}</div>
                                        <p class="text-white/70 text-lg mb-8 font-light">${sec.description[currentLang]}</p>
                                        <button class="btn-action flex items-center gap-3" onclick="openIframe('${sec.btnLink}')">
                                            <span>${sec.btnText[currentLang]}</span><i class="material-icons text-sm">open_in_new</i>
                                        </button>
                                    </div>
                                </div>
                            </div>`;
                        sectionGroup.appendChild(section);
                    });
                    main.appendChild(sectionGroup);
                }

                // --- Footer Links ---
                if (footer) {
                    const fCat = document.createElement('div');
                    fCat.innerHTML = `<h4 class="text-[10px] font-black uppercase text-[#000000] mb-4 text-center md:text-left">${catName}</h4>`;
                    cat.items.forEach(item => {
                        fCat.innerHTML += `<a href="#${item.id}" onclick="closeIframe()" class="footer-link">${item.title[currentLang]}</a>`;
                    });
                    footer.appendChild(fCat);
                }
            });

            initContact();
            initTicker();
            initVideoFix();
        };

        window.setLang = (lang) => {
            currentLang = lang;
            renderApp();
        };

        // --- CONTACT LOGIC ---
        const initContact = () => {
            const t = translations[currentLang];
            const root = document.getElementById('vatiaco-contact-root');
            root.innerHTML = `
                <section id="contacto" class="py-24">
                    <div class="max-w-7xl mx-auto px-6">
                        <div class="glass-panel">
                            <h2 class="text-5xl font-black mb-8 italic uppercase text-[#ffd700]">${t.contactTitle}</h2>
                            <form id="mainContactForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <input type="text" name="nombre" placeholder="${t.fName}" required class="bg-white/10 p-4 outline-none border border-white/10 focus:border-[#ffd700] transition text-white">
                                <input type="tel" name="telefono" placeholder="${t.fPhone}" required class="bg-white/10 p-4 outline-none border border-white/10 focus:border-[#ffd700] transition text-white">
                                <input type="text" name="empresa" placeholder="${t.fCompany}" class="bg-white/10 p-4 outline-none border border-white/10 focus:border-[#ffd700] transition text-white">
                                <input type="text" name="cargo" placeholder="${t.fRole}" class="bg-white/10 p-4 outline-none border border-white/10 focus:border-[#ffd700] transition text-white">
                                <input type="email" name="email" placeholder="${t.fEmail}" required class="md:col-span-2 bg-white/10 p-4 outline-none border border-white/10 focus:border-[#ffd700] transition text-white">
                                <div class="md:col-span-2 flex flex-col gap-2">
                                    <label class="text-[10px] uppercase font-black tracking-widest text-[#ffd700]">${t.fSubject}</label>
                                    <select name="asunto" id="subjectSelector" class="w-full bg-white p-4 text-slate-900 font-bold appearance-none cursor-pointer"></select>
                                </div>
                                <textarea name="mensaje" placeholder="${t.fMsg}" rows="4" class="md:col-span-2 bg-white/10 p-4 outline-none border border-white/10 focus:border-[#ffd700] transition text-white resize-none"></textarea>
                                <div class="md:col-span-2">
                                    <label class="text-[10px] uppercase font-black tracking-widest text-white/4 mb-2 block">${t.fLoc}</label>
                                    <div id="map" style="height: 400px;"></div>
                                </div>
                                <input type="hidden" name="lat" id="lat"><input type="hidden" name="lng" id="lng">
                                <button type="submit" class="btn-action md:col-span-2 py-5 text-xl tracking-[0.2em]">${t.fBtn}</button>
                                <p id="formStatus" class="md:col-span-2 text-center text-xs font-black uppercase mt-4"></p>
                            </form>
                        </div>
                    </div>
                </section>`;

            const sel = document.getElementById('subjectSelector');
            appData.forEach(cat => {
                const group = document.createElement('optgroup');
                group.label = cat.category[currentLang];
                cat.items.forEach(item => {
                    group.innerHTML += `<option value="${item.title[currentLang]}">${item.title[currentLang]}</option>`;
                });
                sel.appendChild(group);
            });

            // Map Init centrado en Cataluña con vista Europea
            const map = L.map('map').setView([41.6, 1.8], 4);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
            let marker;
            map.on('click', e => {
                if (marker) marker.setLatLng(e.latlng);
                else marker = L.marker(e.latlng, { draggable: true }).addTo(map);
                document.getElementById('lat').value = e.latlng.lat;
                document.getElementById('lng').value = e.latlng.lng;
            });

            document.getElementById('mainContactForm').onsubmit = async (e) => {
                e.preventDefault();
                const status = document.getElementById('formStatus');
                status.innerText = t.fStatus;
                status.style.color = "#ffd700";
                setTimeout(() => {
                    status.innerText = t.fSuccess;
                    status.style.color = "#22c55e";
                }, 1500);
            };
        };

        // --- TICKER & VIDEO LOGIC ---
        const initTicker = () => {
            const t = translations[currentLang];
            const ticker = document.getElementById('ticker-content');
            let content = "";
            appData.forEach(cat => {
                cat.items.forEach(item => {
                    if (item.isNew) content += `<div class="ticker-item"><span class="ticker-label">${t.newsLabel}</span> SISTEMA ${item.title[currentLang]}: ${item.subtitle[currentLang]} — ${t.newsSuffix} —</div>`;
                });
            });
            ticker.innerHTML = content + content;
        };

        const initVideoFix = () => {
            document.querySelectorAll('.video-strict-loop').forEach(v => {
                v.playbackRate = 8.0;
                v.onended = () => {
                    const s = v.currentSrc; v.src = ""; v.src = s; v.load(); v.playbackRate = 8.0; v.play();
                };
            });
        };

        // --- GLOBAL UTILS ---
        window.openIframe = (url) => { document.getElementById('main-iframe').src = url; document.getElementById('iframe-viewer').style.display = 'block'; document.body.style.overflow = 'hidden'; };
        window.closeIframe = () => { document.getElementById('iframe-viewer').style.display = 'none'; document.getElementById('main-iframe').src = ""; document.body.style.overflow = 'auto'; };
        window.openLogin = () => { const m = document.getElementById('login-modal'); m.style.display = 'flex'; setTimeout(() => m.classList.add('active'), 10); };
        window.closeLogin = (e) => { if (!e || e.target.id === 'login-modal') { const m = document.getElementById('login-modal'); m.classList.remove('active'); setTimeout(() => m.style.display = 'none', 300); } };
        window.openIframe = (url) => {
            const viewer = document.getElementById('iframe-viewer');
            const iframe = document.getElementById('main-iframe');

            iframe.src = url;
            viewer.style.display = 'block';
            document.body.style.overflow = 'hidden'; // Bloquea el scroll de la web base
        };

        window.closeIframe = () => {
            const viewer = document.getElementById('iframe-viewer');
            const iframe = document.getElementById('main-iframe');

            viewer.style.display = 'none';
            iframe.src = "";
            document.body.style.overflow = 'auto'; // Devuelve el scroll
        };
        renderApp();
    </script>
</body>

</html>
